<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="update-banner" class="update-banner" style="display:none;">
    <div class="update-banner-text">
      <span class="version-text"></span>
      <span id="update-notes" class="update-notes"></span>
    </div>
    <div class="update-banner-actions">
      <button id="update-btn">Update now</button>
      <button id="remind-later-btn" class="remind-later-btn">Remind me later</button>
    </div>
  </div>

  <div class="panel-content">
    <h2>Project Auditor</h2>

    <div class="row search-row">
      <input id="search-input" type="text" placeholder="Enter Effect Name..." />
      <button id="btn-find-fx-name">Find Effect</button>
    </div>

    <div id="result-area" class="result-area">
      <table class="result-table">
        <thead>
          <tr>
            <th class="col-path">Item Path [Index]</th>
            <th class="col-status">Status</th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
      <div id="greeting" class="greeting" style="display:none;"></div>
    </div>

    <div class="row info-row">
      <span id="counter-label">Total items: 0  |  Double-click to jump to item  |  Hold Ctrl/Shift to select multiple items</span>
      <label class="checkbox-label">
        <input id="cb-include-locked" type="checkbox" checked />
        Include locked layers
      </label>
    </div>

    <div class="row search-buttons-row">
      <button id="btn-find-space">Comps with Spaces</button>
      <button id="btn-fix-space">Fix Space -> _</button>
      <button id="btn-find-hidden">Hidden Layers</button>
      <button id="btn-find-effects">Hidden Effects</button>
    </div>

    <div class="row action-buttons-row">
      <button id="btn-find-dupes" class="action-btn action-copy">Find Duplicate Names</button>
      <button id="btn-del-sel" class="action-btn action-del-sel">Delete Selected</button>
      <button id="btn-del-all" class="action-btn action-del-all">Delete All</button>
    </div>

    <div class="row cm-row">
      <button id="btn-cm" class="action-btn action-cm">CM — Merge 2 Selected Comps</button>
    </div>

    <pre id="update-status" class="status-text"></pre>
    <div class="version-footer">v<span id="current-version"></span></div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
